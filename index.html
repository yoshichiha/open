    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      display: block;
      padding: 14px 16px;
      border: 1px solid #d8c7b4;
      border-radius: 8px;
      color: #24505f;
      text-decoration: none;
      background: #ffffff;
